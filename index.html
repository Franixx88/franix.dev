  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n}\n.avatar-img {\n  position:absolute; top:50%; left:50%;\n  width:180px; height:180px; border-radius:50%;\n  transform:translate(-50%,-50%);\n  overflow:hidden;\n  background:linear-gradient(135deg,var(--bg3),#1e1608);\n  border:2px solid rgba(212,160,23,.35);\n  box-shadow:0 0 40px rgba(163,230,53,.12),0 0 80px rgba(212,160,23,.08);\n  display:flex; align-items:center; justify-content:center;\n}\n.avatar-initials {\n  font-family:var(--disp); font-weight:800; font-size:3rem;\n  background:linear-gradient(135deg,var(--lime),var(--brass));\n  -webkit-background-clip:text; -webkit-text-fill-color:transparent;\n  letter-spacing:-.04em; user-select:none;\n}\n.avatar-photo {\n  width:100%; height:100%; object-fit:cover; display:block;\n}\n.avatar-deco {\n  position:absolute; top:0; left:0; width:100%; height:100%;\n  animation:spin 40s linear infinite;\n  pointer-events:none;\n}\n.avatar-deco2 {\n  position:absolute; top:0; left:0; width:100%; height:100%;\n  animation:spin 80s linear infinite reverse;\n  pointer-events:none;\n}\n@keyframes spin { to { transform:rotate(360deg); } }\n\n.hero-scroll {\n  position:absolute; bottom:36px; left:8vw; z-index:2;\n  display:flex; align-items:center; gap:10px;\n  color:var(--muted); font-family:var(--mono); font-size:.72rem; letter-spacing:.12em;\n}\n.scroll-line { width:36px; height:1px; background:linear-gradient(90deg,var(--brass),transparent); }\n\n/* ─────────── SECTION COMMON ─────────── */\n.sec-pad { padding:110px 8vw; }\n.sec-label {\n  font-family:var(--mono); font-size:.72rem; color:var(--brass);\n  letter-spacing:.14em; text-transform:uppercase; margin-bottom:10px;\n}\n.sec-title {\n  font-family:var(--disp); font-size:clamp(2rem,4vw,2.8rem); font-weight:800;\n  letter-spacing:-.025em; line-height:1.05; margin-bottom:56px; color:var(--text);\n}\n.sec-title span {\n  background:linear-gradient(90deg,var(--lime),var(--brass));\n  -webkit-background-clip:text; -webkit-text-fill-color:transparent;\n}\n\n/* ─────────── S tion:border-color .3s, box-shadow .3s;\n}\n.tl-item:hover .tl-node {\n  border-color:var(--lime); box-shadow:0 0 18px rgba(163,230,53,.4);\n}\n.tl-node::after {\n  content:''; position:absolute; top:50%; left:100%; margin-top:-.5px;\n  width:36px; height:1px;\n  background:linear-gradient(90deg,rgba(212,160,23,.5),transparent);\n}\n.tl-year {\n  font-family:var(--mono); font-size:.72rem; color:var(--brass);\n  letter-spacing:.1em; margin-bottom:6px;\n}\n.tl-title {\n  font-family:var(--disp); font-weight:700; font-size:1.05rem;\n  color:var(--text); margin-bottom:6px;\n}\n.tl-body {\n  font-size:.875rem; color:#96897b; line-height:1.75; max-width:520px;\n}\n.tl-badge {\n  display:inline-block; margin-top:10px; font-family:var(--mono); font-size:.66rem;\n  padding:3px 10px; border-radius:3px;\n  background:rgba(163,230,53,.07); border:1px solid rgba(163,230,53,.2);\n  color:var(--lime); letter-spacing:.06em;\n}\n\n/* ─────────── INTERESTS ─────────── */\n#interests { padding:110px 8vw; }\n.int-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:20px; }\n.int-card {\n  background:var(--glass); border:1px solid var(--bord); border-radius:12px;\n  padding:32px; position:relative; overflow:hidden;\n  transition:border-color .25s,transform .2s;\n}\n.int-card::after {\n  content:''; position:absolute; bottom:-40px; right:-40px;\n  width:120px; height:120px; border-radius:50%; opacity:.05; pointer-events:none;\n  transition:opacity .3s;\n}\n.int-lime::after  { background:var(--lime); }\n.int-brass::after { background:var(--brass); }\n.int-pur::after   { background:var(--pur); }\n.int-card:hover { border-color:rgba(212,160,23,.4); transform:translateY(-4px); }\n.int-card:hover::after { opacity:.12; }\n.int-ico {\n  width:38px; height:38px; border-radius:8px; margin-bottom:18px;\n  border:1px solid var(--bord);\n  display:flex; align-items:center; justify-content:center;\n  font-family:var(--mono); font-size:.7rem; font-weight:700;\n  color:var(--brass); letter-spacing:.04em;\n}\n.int-title { font-family:var(--disp); font-weight:700; font-size:1.05rem; margin-bottom:8px; }\n.int-body  { font-size:.85rem; color:#96897b; line-height:1.75; margin-bottom:18px; }\n.int-tags  { display:flex; flex-wrap:wrap; gap:7px; }\n.int-tag {\n  padding:4px 11px; border-radius:3px; font-size:.72rem; font-weight:500;\n  font-family:var(--mono); letter-spacing:.04em;\n}\n.int-tag.lime   { background:rgba(163,230,53,.09); color:var(--lime);  border:1px solid rgba(163,230,53,.2); }\n.int-tag.brass  { background:rgba(212,160,23,.09); color:var(--brass); border:1px solid rgba(212,160,23,.2); }\n.int-tag.pur    { background:rgba(155,114,207,.09); color:var(--pur);  border:1px solid rgba(155,114,207,.2); }\n\n/* ─────────── CONTACT ─────────── */\n#contact { padding:110px 8vw 150px; }\n.contact-inner { max-width:580px; }\n.contact-desc { color:#96897b; font-size:.95rem; margin-bottom:44px; line-height:1.8;\n  border-left:2px solid rgba(163,230,53,.3); padding-left:18px; }\n.contact-grid { display:grid; gap:12px; }\n.contact-btn {\n  display:flex; align-items:center; gap:14px;\n  padding:16px 20px; border-radius:8px;\n  font-family:var(--sans); font-size:.875rem; font-weight:500;\n  text-decoration:none; color:var(--text);\n  background:var(--glass); border:1px solid var(--bord);\n  transition:border-color .2s,transform .15s,background .2s;\n}\n.contact-btn:hover { border-color:var(--brass); transform:translateX(5px);\n  background:rgba(212,160,23,.06); }\n.contact-btn.copied { border-color:var(--lime); color:var(--lime); }\n.cb-ico {\n  width:36px; height:36px; border-radius:6px; flex-shrink:0;\n  background:rgba(212,160,23,.08); border:1px solid var(--bord);\n  display:flex; align-items:center; justify-content:center; color:var(--brass);\n}\n.cb-txt { flex:1; }\n.cb-lbl { font-family:var(--mono); font-size:.68rem; color:var(--muted); letter-spacing:.07em; }\n.cb-val { font-weight:600; font-size:.9rem; }\n.cb-arr { color:var(--muted); font-size:.9rem; transition:color .2s; }\n.contact-btn:hover .cb-arr { color:var(--brass); }\n\n/* ─────────── FOOTER ─────────── */\nfooter {\n  position:relative; z-index:2; text-align:center; padding:22px;\n  border-top:1px solid var(--bord);\n  font-family:var(--mono); font-size:.72rem; color:var(--muted);\n}\nfooter em { color:var(--brass); font-style:normal; }\n\n/* ─────────── OXIDATION + DECOR ─────────── */\n:root { --ox: 0; --patina: #5d9e75; }\n\n.deco-svg { position:absolute; pointer-events:none; color:var(--brass); z-index:1; }\n.gear-decor { opacity:.1; animation:gearSpin 60s linear infinite; }\n.gear-decor.rev { animation:gearSpin 90s linear infinite reverse; }\n.gear-decor.fast { animation-duration:35s; }\n@keyframes gearSpin { to { transform:rotate(360deg); } }\n\n.solar-decor { color:var(--lime); opacity:.16; }\n\n.g-hero-br   { bottom:-90px; right:-70px; width:260px; height:260px; }\n.g-hero-tl   { top:110px; left:-60px; width:150px; height:150px; opacity:.06; }\n.g-sk-r      { top:40px; right:-80px; width:220px; height:220px; opacity:.08; }\n.g-sk-l      { bottom:60px; left:-40px; width:130px; height:130px; opacity:.09; }\n.g-tl-r      { top:18%; right:-60px; width:180px; height:180px; opacity:.08; }\n.g-tl-l      { bottom:8%; left:-50px; width:140px; height:140px; opacity:.09; }\n.g-int-r     { top:50px; right:-70px; width:180px; height:180px; opacity:.1; }\n.g-ct-l      { bottom:100px; left:-60px; width:160px; height:160px; opacity:.1; }\n\n.sp-hero     { top:70px; right:46px; width:110px; }\n.sp-sk       { bottom:40px; right:40px; width:130px; opacity:.18; }\n.sp-int-1    { top:30px; right:40px; width:110px; opacity:.2; }\n.sp-int-2    { bottom:40px; left:30px; width:90px; opacity:.14; }\n\n/* ── PATINA VEIL ── */\n.patina-veil {\n  position:fixed; inset:0; pointer-events:none; z-index:3;\n  background:\n    radial-gradient(ellipse at 50% 100%, rgba(93,158,117,calc(var(--ox)*.18)) 0%, transparent 55%),\n    linear-gradient(180deg, transparent 55%, rgba(93,158,117,calc(var(--ox)*.07)) 100%);\n  mix-blend-mode:screen;\n}\n\n/* ── VINES ── */\n.vines-layer {\n  position:fixed; bottom:0; left:0; right:0;\n  height:240px; z-index:4; pointer-events:none; overflow:hidden;\n}\n.vine {\n  position:absolute; bottom:-10px; color:var(--lime);\n  opacity:calc(var(--ox)*.85);\n  transform:scaleY(calc(var(--ox)*1.08)) translateY(calc((1 - var(--ox))*30px));\n  transform-origin:bottom center;\n  transition:transform .5s cubic-bezier(.25,1,.5,1), opacity .5s;\n  filter:drop-shadow(0 0 6px rgba(163,230,53,.3));\n}\n.vine-1 { left:2%;  width:60px; height:210px; }\n.vine-2 { left:18%; width:70px; height:170px; }\n.vine-3 { left:42%; width:55px; height:140px; }\n.vine-4 { right:30%; width:68px; height:190px; }\n.vine-5 { right:14%; width:62px; height:220px; }\n.vine-6 { right:2%;  width:48px; height:160px; }\n\n/* Moss overlay on cards */\n.gauge-card::after, .int-card::before, .contact-btn::after {\n  content:''; position:absolute; inset:0; border-radius:inherit;\n  pointer-events:none;\n  background:linear-gradient(135deg, transparent 55%, rgba(93,158,117, calc(var(--ox)*.16)) 100%);\n  opacity:calc(var(--ox)*.95);\n  transition:opacity .3s;\n}\n\n/* ─────────── MAXIMALIST STEAMPUNK ─────────── */\n/* Pipe frames along edges */\n.pipe-frame {\n  position:fixed; z-index:3; pointer-events:none;\n  background:linear-gradient(var(--pipe-grad,180deg),#3a2a0f 0%,#8a6820 35%,#d4a017 50%,#8a6820 65%,#3a2a0f 100%);\n  box-shadow:inset 0 0 6px rgba(0,0,0,.7), 0 0 12px rgba(0,0,0,.5);\n}\n.pipe-top, .pipe-bot { left:0; right:0; height:18px; --pipe-grad:180deg; }\n.pipe-top { top:0; }\n.pipe-bot { bottom:0; }\n.pipe-left, .pipe-right { top:0; bottom:0; width:18px; --pipe-grad:90deg; }\n.pipe-left { left:0; }\n.pipe-right { right:0; }\n\n.pipe-joint {\n  position:fixed; width:32px; height:32px; z-index:4; pointer-events:none;\n  background:radial-gradient(circle,#d4a017 0%,#8a6820 55%,#3a2a0f 100%);\n  border-radius:50%;\n  box-shadow:inset 0 0 8px rgba(0,0,0,.8), 0 0 10px rgba(0,0,0,.6);\n}\n.pipe-joint::before {\n  content:''; position:absolute; inset:6px; border-radius:50%;\n  border:2px dashed rgba(60,40,10,.8);\n}\n.pipe-joint::after {\n  content:''; position:absolute; inset:13px; border-radius:50%;\n  background:#2a1c08; box-shadow:inset 0 0 4px #000;\n}\n.pj-tl { top:4px; left:4px; }\n.pj-tr { top:4px; right:4px; }\n.pj-bl { bottom:4px; left:4px; }\n.pj-br { bottom:4px; right:4px; }\n/* mid joints on each edge */\n.pj-tm { top:4px; left:calc(50% - 16px); }\n.pj-bm { bottom:4px; left:calc(50% - 16px); }\n.pj-lm { left:4px; top:calc(50% - 16px); }\n.pj-rm { right:4px; top:calc(50% - 16px); }\n.pj-tq1 { top:4px; left:25%; }\n.pj-tq3 { top:4px; left:75%; }\n.pj-bq1 { bottom:4px; left:25%; }\n.pj-bq3 { bottom:4px; left:75%; }\n\n.pipe-joint.hot {\n  background:radial-gradient(circle,#fbbf24 0%,#d4a017 40%,#8a6820 100%);\n  box-shadow:inset 0 0 8px rgba(0,0,0,.6), 0 0 22px rgba(251,191,36,.6);\n}\n\n/* Steam puffs */\n.steam {\n  position:fixed; width:24px; height:24px; border-radius:50%;\n  background:radial-gradient(circle,rgba(255,255,255,.7) 0%,rgba(255,255,255,.25) 45%,transparent 75%);\n  pointer-events:none; z-index:5;\n  animation:steamRise 2.4s ease-out forwards;\n  filter:blur(1px);\n}\n@keyframes steamRise {\n  0%   { opacity:0; transform:translate(-50%,-50%) scale(.4); }\n  25%  { opacity:.85; transform:translate(var(--sx,-50%),calc(-50% - 25px)) scale(1); }\n  60%  { opacity:.6; transform:translate(var(--sx2,-50%),calc(-50% - 60px)) scale(1.5); }\n  100% { opacity:0; transform:translate(var(--sx3,-50%),calc(-50% - 100px)) scale(2.2); }\n}\n\n/* Rivets on cards */\n.rivet {\n  position:absolute; width:10px; height:10px; border-radius:50%;\n  background:radial-gradient(circle at 35% 35%,#e8c56a 0%,#8a6820 60%,#3a2a0f 100%);\n  box-shadow:inset 0 -1px 2px rgba(0,0,0,.6), 0 1px 2px rgba(0,0,0,.5);\n  pointer-events:none; z-index:2;\n}\n.rivet.rv-tl { top:8px; left:8px; }\n.rivet.rv-tr { top:8px; right:8px; }\n.rivet.rv-bl { bottom:8px; left:8px; }\n.rivet.rv-br { bottom:8px; right:8px; }\n\n/* Lightbulbs */\n.bulb {\n  position:absolute; width:14px; height:18px; z-index:3; pointer-events:none;\n}\n.bulb::before {\n  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);\n  width:12px; height:14px; border-radius:50% 50% 40% 40%;\n  background:radial-gradient(circle at 35% 30%,#fde68a 0%,#f59e0b 50%,#78350f 100%);\n  box-shadow:0 0 12px rgba(251,191,36,.7), 0 0 24px rgba(251,191,36,.4);\n  animation:bulbFlicker 4s ease-in-out infinite;\n}\n.bulb::after {\n  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);\n  width:8px; height:5px; background:#2a1c08;\n  border-radius:0 0 2px 2px;\n}\n@keyframes bulbFlicker {\n  0%,90%,100%{opacity:1}\n  92%{opacity:.6} 94%{opacity:1} 96%{opacity:.7}\n}\n\n/* Windmill / solar turbine */\n.windmill { position:absolute; pointer-events:none; z-index:2; color:var(--lime); }\n.windmill svg { animation:gearSpin 8s linear infinite; }\n\n/* Wires */\n.wire {\n  position:absolute; pointer-events:none; z-index:2;\n  stroke:#6b4a15; stroke-width:2; fill:none;\n  filter:drop-shadow(0 1px 1px rgba(0,0,0,.6));\n}\n\n/* Victorian frame on section titles */\n.victorian {\n  display:inline-block; position:relative;\n  padding:4px 40px;\n}\n.victorian::before, .victorian::after {\n  content:''; position:absolute; top:50%; transform:translateY(-50%);\n  width:32px; height:18px;\n  background:\n    linear-gradient(90deg, var(--brass) 0%, transparent 100%) no-repeat;\n}\n.victorian::before {\n  left:0;\n  background:\n    radial-gradient(circle at right,var(--brass) 4px, transparent 5px) 0 50%/100% 100% no-repeat,\n    linear-gradient(90deg, transparent, var(--brass)) left center/100% 1px no-repeat;\n}\n.victorian::after {\n  right:0;\n  background:\n    radial-gradient(circle at left,var(--brass) 4px, transparent 5px) 0 50%/100% 100% no-repeat,\n    linear-gradient(90deg, var(--brass), transparent) right center/100% 1px no-repeat;\n}\n\n/* Spring dividers */\n.spring-divider {\n  position:relative; height:40px; margin:20px 0;\n  pointer-events:none;\n}\n\n/* Keep body content above pipes */\nnav { z-index:100; }\nmain, section { z-index:2; }\n\n/* Raise baseline greenery (moss from the start) */\n:root { --mossbase: .28; }\n.gauge-card::after, .int-card::before, .contact-btn::after {\n  background:linear-gradient(135deg, transparent 50%, rgba(93,158,117, calc((var(--ox) + var(--mossbase))*.14)) 100%);\n  opacity:calc(min(1, var(--ox)*.95 + var(--mossbase)*.7));\n}\n.vines-layer .vine {\n  opacity:calc(min(1, var(--ox)*.85 + var(--mossbase)*.45));\n  transform:scaleY(calc(min(1.08, var(--ox)*1.08 + var(--mossbase)*.4))) translateY(calc((1 - var(--ox) - var(--mossbase)*.5)*30px));\n}\n.patina-veil {\n  background:\n    radial-gradient(ellipse at 50% 100%, rgba(93,158,117,calc((var(--ox) + var(--mossbase))*.15)) 0%, transparent 55%),\n    linear-gradient(180deg, transparent 55%, rgba(93,158,117,calc((var(--ox) + var(--mossbase)*.5)*.07)) 100%);\n}\n\nbody { background:var(--bg); }\n\n/* ─────────── REVEAL ─────────── */\n.reveal { opacity:0; transform:translateY(24px); transition:opacity .65s ease,transform .65s ease; }\n.reveal.visible { opacity:1; transform:none; }\n.reveal-l { opacity:0; transform:translateX(-20px); transition:opacity .65s ease,transform .65s ease; }\n.reveal-l.visible { opacity:1; transform:none; }\n\n/* ─────────── TWEAKS PANEL ─────────── */\n#tweaks-panel {\n  display:none; position:fixed; bottom:24px; right:24px; z-index:9990;\n  background:#0f0b07; border:1px solid var(--bord); border-radius:10px;\n  padding:20px; width:240px;\n  box-shadow:0 20px 50px rgba(0,0,0,.6);\n  font-family:var(--sans); font-size:.82rem;\n}\n#tweaks-panel.open { display:block; }\n#tweaks-panel h4 {\n  font-family:var(--disp); font-size:.9rem; font-weight:700; color:var(--text);\n  margin-bottom:16px; letter-spacing:.02em;\n}\n.tweak-row { margin-bottom:14px; }\n.tweak-row label { display:block; color:var(--muted); margin-bottom:6px; font-size:.75rem; letter-spacing:.05em; }\n.tweak-row select, .tweak-row input[type=range] {\n  width:100%; background:#1a1408; border:1px solid var(--bord);\n  color:var(--text); border-radius:5px; padding:6px 10px; font-size:.8rem;\n  font-family:var(--sans);\n}\n.tweak-row input[type=range] { padding:4px 0; background:transparent; border:none; }\n.tweak-swatch { display:flex; gap:8px; flex-wrap:wrap; }\n.sw {\n  width:26px; height:26px; border-radius:50%; cursor:pointer !important;\n  border:2px solid transparent; transition:border-color .15s,transform .15s;\n}\n.sw:hover { transform:scale(1.15); }\n.sw.active { border-color:var(--text); }\n\n/* ─────────── RESPONSIVE ─────────── */\n@media(max-width:860px){\n  #hero { grid-template-columns:1fr; }\n  .hero-right { display:none; }\n  nav { padding:16px 24px; }\n  .nav-links { display:none; }\n  .sec-pad,#skills,#timeline,#interests,#contact { padding:80px 24px; }\n}\n@media(max-width:480px){\n  *{ cursor:auto !important; }\n  .c-dot,.c-ring{ display:none; }\n  .hero-name .first,.hero-name .last { font-size:2.8rem; }\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<canvas id=\"bg-canvas\"><\u002Fcanvas>\n<div class=\"patina-veil\"><\u002Fdiv>\n\n<div class=\"vines-layer\" id=\"vines-layer\"><\u002Fdiv>\n<div class=\"cursor-glow\" id=\"glow\"><\u002Fdiv>\n<div class=\"c-dot\" id=\"c-dot\"><\u002Fdiv>\n<div class=\"c-ring\" id=\"c-ring\"><\u002Fdiv>\n\n<!-- NAV -->\n<nav>\n  <a href=\"#hero\" class=\"nav-logo\">franix.dev<\u002Fa>\n  <ul class=\"nav-links\">\n    <li><a href=\"#skills\">Skills<\u002Fa><\u002Fli>\n    <li><a href=\"#timeline\">Timeline<\u002Fa><\u002Fli>\n    <li><a href=\"#interests\">Interests<\u002Fa><\u002Fli>\n    <li><a href=\"#contact\">Contact<\u002Fa><\u002Fli>\n  <\u002Ful>\n<\u002Fnav>\n\n<!-- HERO -->\n<section id=\"hero\" data-screen-label=\"Hero\">\n  <div class=\"hero-left\">\n    <div class=\"hero-tag\"><span class=\"pulse\"><\u002Fspan>Available for projects<\u002Fdiv>\n\n    <h1 class=\"hero-name\">\n      <span class=\"first\">Roman<\u002Fspan>\n      <span class=\"last\">Sidorenko<\u002Fspan>\n    <\u002Fh1>\n\n    <p class=\"hero-alias\">aka <em>Franix<\u002Fem> / <em>Franix88<\u002Fem><\u002Fp>\n\n    <div class=\"tw-wrap\">\n      <span class=\"tw-pfx\">&gt;_<\u002Fspan>\n      <span id=\"tw-text\"><\u002Fspan>\n      <span class=\"tw-cursor\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <p class=\"hero-about\">\n      Python &amp; C developer, <strong>15 years old<\u002Fstrong>, 3 years in. Obsessed with how things work at every layer — from hardware to the browser. Heading toward <strong>Full Stack + Embedded engineering<\u002Fstrong>. Already shipping.\n    <\u002Fp>\n\n    <div class=\"hero-btns\">\n      <a href=\"#contact\" class=\"btn-prime\">Get in touch<\u002Fa>\n      <a href=\"#timeline\" class=\"btn-ghost\">My journey ↓<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- AVATAR -->\n  <div class=\"hero-right\">\n    <div class=\"avatar-wrap\">\n      <!-- Outer slow ring -->\n      <svg class=\"avatar-deco\" viewBox=\"0 0 280 280\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n        <circle cx=\"140\" cy=\"140\" r=\"132\" stroke=\"rgba(212,160,23,0.22)\" stroke-width=\"1\" stroke-dasharray=\"5 12\"><\u002Fcircle>\n        <circle cx=\"140\" cy=\"140\" r=\"118\" stroke=\"rgba(163,230,53,0.1)\" stroke-width=\".8\" stroke-dasharray=\"2 22\"><\u002Fcircle>\n        <!-- cardinal ticks -->\n        <line x1=\"140\" y1=\"4\" x2=\"140\" y2=\"20\" stroke=\"rgba(212,160,23,0.55)\" stroke-width=\"1.5\"><\u002Fline>\n        <line x1=\"140\" y1=\"260\" x2=\"140\" y2=\"276\" stroke=\"rgba(212,160,23,0.55)\" stroke-width=\"1.5\"><\u002Fline>\n        <line x1=\"4\" y1=\"140\" x2=\"20\" y2=\"140\" stroke=\"rgba(212,160,23,0.55)\" stroke-width=\"1.5\"><\u002Fline>\n        <line x1=\"260\" y1=\"140\" x2=\"276\" y2=\"140\" stroke=\"rgba(212,160,23,0.55)\" st ><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"gauge-card reveal\">\n      <svg class=\"gauge-svg\" width=\"64\" height=\"64\" viewBox=\"0 0 64 64\">\n        <circle cx=\"32\" cy=\"32\" r=\"26\" fill=\"none\" stroke=\"rgba(255,255,255,0.05)\" stroke-width=\"5\"><\u002Fcircle>\n        <circle cx=\"32\" cy=\"32\" r=\"26\" fill=\"none\" stroke=\"var(--pur)\" stroke-width=\"5\" stroke-dasharray=\"163.4\" stroke-dashoffset=\"163.4\" stroke-linecap=\"round\" transform=\"rotate(-90 32 32)\" class=\"gauge-arc\" data-pct=\"0.35\"><\u002Fcircle>\n        <text x=\"32\" y=\"37\" text-anchor=\"middle\" font-family=\"JetBrains Mono,monospace\" font-size=\"9\" fill=\"rgba(155,114,207,0.8)\" font-weight=\"700\">FS<\u002Ftext>\n      <\u002Fsvg>\n      <div class=\"gc-info\">\n        <div class=\"gc-name\">Full Stack<\u002Fdiv>\n        <div class=\"gc-desc\">HTML, CSS, JS. This site is part of the journey.<\u002Fdiv>\n        <div class=\"gc-tags\"><span class=\"gc-tag\">learning<\u002Fspan><span class=\"gc-tag\">35%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"gauge-card reveal\">\n      <svg class=\"gauge-svg\" width=\"64\" height=\"64\" viewBox=\"0 0 64 64\">\n        <circle cx=\"32\" cy=\"32\" r=\"26\" fill=\"none\" stroke=\"rgba(255,255,255,0.05)\" stroke-width=\"5\"><\u002Fcircle>\n        <circle cx=\"32\" cy=\"32\" r=\"26\" fill=\"none\" stroke=\"var(--brass)\" stroke-width=\"5\" stroke-dasharray=\"163.4\" stroke-dashoffset=\"163.4\" stroke-linecap=\"round\" transform=\"rotate(-90 32 32)\" class=\"gauge-arc\" data-pct=\"0.60\"><\u002Fcircle>\n        <text x=\"32\" y=\"37\" text-anchor=\"middle\" font-family=\"JetBrains Mono,monospace\" font-size=\"8\" fill=\"rgba(212,160,23,0.85)\" font-weight=\"700\">GIT<\u002Ftext>\n      <\u002Fsvg>\n      <div class=\"gc-info\">\n        <div class=\"gc-name\">Git &amp; GitHub<\u002Fdiv>\n        <div class=\"gc-desc\">Version control, open-source, personal project hosting.<\u002Fdiv>\n        <div class=\"gc-tags\"><span class=\"gc-tag\">daily<\u002Fspan><span class=\"gc-tag\">60%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"gauge-card reveal\">\n      <svg class=\"gauge-svg\" width=\"64\" height=\"64\" viewBox=\"0 0 64 64\">\n        <circle cx=\"32\" cy=\"32\" r=\"26\" fill=\"none\" stroke=\"rgba(255,255,255,0.05)\" stroke-width=\"5\"><\u002Fcircle>\n        <circle cx=\"32\" cy=\"32\" r=\"26\" fill=\"none\" stroke=\"#60a5fa\" stroke-width=\"5\" stroke-dasharray=\"163.4\" stroke-dashoffset=\"163.4\" stroke-linecap=\"round\" transform=\"rotate(-90 32 32)\" class=\"gauge-arc\" data-pct=\"0.25\"><\u002Fcircle>\n        <text x=\"32\" y=\"37\" text-anchor=\"middle\" font-family=\"JetBrains Mono,monospace\" font-size=\"7.5\" fill=\"rgba(96,165,250,0.8)\" font-weight=\"700\">EMB<\u002Ftext>\n      <\u002Fsvg>\n      <div class=\"gc-info\">\n        <div class=\"gc-name\">Embedded<\u002Fdiv>\n        <div class=\"gc-desc\">Mobile &amp; portable device engineering — silicon to software.<\u002Fdiv>\n        <div class=\"gc-tags\"><span class=\"gc-tag\">exploring<\u002Fspan><span class=\"gc-tag\">25%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"gauge-card reveal\">\n      <svg class=\"gauge-svg\" width=\"64\" height=\"64\" viewBox=\"0 0 64 64\">\n        <circle cx=\"32\" cy=\"32\" r=\"26\" fill=\"none\" stroke=\"rgba(255,255,255,0.05)\" stroke-width=\"5\"><\u002Fcircle>\n        <circle cx=\"32\" cy=\"32\" r=\"26\" fill=\"none\" stroke=\"var(--lime)\" stroke-width=\"5\" stroke-dasharray=\"163.4\" stroke-dashoffset=\"163.4\" stroke-linecap=\"round\" transform=\"rotate(-90 32 32)\" class=\"gauge-arc\" data-pct=\"0.55\"><\u002Fcircle>\n        <text x=\"32\" y=\"37\" text-anchor=\"middle\" font-family=\"JetBrains Mono,monospace\" font-size=\"8\" fill=\"rgba(163,230,53,0.8)\" font-weight=\"700\">CLI<\u002Ftext>\n      <\u002Fsvg>\n      <div class=\"gc-info\">\n        <div class=\"gc-name\">Terminal &amp; Linux<\u002Fdiv>\n        <div class=\"gc-desc\">Comfortable in the shell. Automation, scripting, env setup.<\u002Fdiv>\n        <div class=\"gc-tags\"><span class=\"gc-tag\">daily<\u002Fspan><span class=\"gc-tag\">55%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TIMELINE -->\n<section id=\"timeline\" data-screen-label=\"Timeline\">\n  <div class=\"sec-pad\">\n    <div class=\"sec-label reveal\">// my journey<\u002Fdiv>\n    <h2 class=\"sec-title reveal\">Timeline<\u002Fh2>\n\n    <div class=\"tl-wrap\">\n\n      <div class=\"tl-item reveal-l\">\n        <div class=\"tl-node\"><\u002Fdiv>\n        <div class=\"tl-year\">22 JAN 2011<\u002Fdiv>\n        <div class=\"tl-title\">Starting Coordinates<\u002Fdiv>\n        <div class=\"tl-body\">Born. Somewhere in Russia. The universe installs a new process. No errors reported yet.<\u002Fdiv>\n        <span class=\"tl-badge\">init<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"tl-item reveal-l\">\n        <div class=\"tl-node\"><\u002Fdiv>\n        <div class=\"tl-year\">2022<\u002Fdiv>\n        <div class=\"tl-title\">First Line of Code<\u002Fdiv>\n        <div class=\"tl-body\">Discovered Python at age 11. Typed <code style=\"color:var(--lime);font-family:var(--mono);font-size:.85em\">print(\"Hello World\")<\u002Fcode> and never looked back. Scripts, games, bots — anything to make the computer do something.<\u002Fdiv>\n        <span class=\"tl-badge\">python<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"tl-item reveal-l\">\n        <div class=\"tl-node\"><\u002Fdiv>\n        <div class=\"tl-year\">2023<\u002Fdiv>\n        <div class=\"tl-title\">Going Low-Level<\u002Fdiv>\n        <div class=\"tl-body\">Discovered C. Memory management, pointers, raw performance. Understanding what Python abstracts away completely changed how I think about code.<\u002Fdiv>\n        <span class=\"tl-badge\">C lang<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"tl-item reveal-l\">\n        <div class=\"tl-node\"><\u002Fdiv>\n        <div class=\"tl-year\">2024<\u002Fdiv>\n        <div class=\"tl-title\">Open Source &amp; Collaboration<\u002Fdiv>\n        <div class=\"tl-body\">Joined The Stratosphere Solutions org. Started contributing to real projects — RAC protocol, TUI clients, patched Discord. Code meets the outside world.<\u002Fdiv>\n        <span class=\"tl-badge\">github<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"tl-item reveal-l\">\n        <div class=\"tl-node\"><\u002Fdiv>\n        <div class=\"tl-year\">2025<\u002Fdiv>\n        <div class=\"tl-title\">Full Stack Journey Begins<\u002Fdiv>\n        <div class=\"tl-body\">Built franix.dev from scratch. Learned HTML, CSS, JS in the process. This site is a living artifact of that journey — rough edges included.<\u002Fdiv>\n        <span class=\"tl-badge\">web<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"tl-item reveal-l\">\n        <div class=\"tl-node\" style=\"border-color:var(--lime);box-shadow:0 0 14px rgba(163,230,53,.5)\"><\u002Fdiv>\n        <div class=\"tl-year\">2026 — NOW<\u002Fdiv>\n        <div class=\"tl-title\">Available &amp; Building<\u002Fdiv>\n        <div class=\"tl-body\">15 years old. 3 years in. Open for collaborations, interesting projects, and conversations. The story gets interesting here.<\u002Fdiv>\n        <span class=\"tl-badge\" style=\"border-color:rgba(163,230,53,.4);color:var(--lime)\">open<\u002Fspan>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INTERESTS -->\n<section id=\"interests\" data-screen-label=\"Interests\">\n  <div class=\"sec-pad\">\n    <div class=\"sec-label reveal\">// what drives me<\u002Fdiv>\n    <h2 class=\"sec-title reveal\">Interests<\u002Fh2>\n\n    <div class=\"int-grid\">\n      <div class=\"int-card int-lime reveal\">\n        <div class=\"int-ico\">DEV<\u002Fdiv>\n        <div class=\"int-title\">Programming<\u002Fdiv>\n        <div class=\"int-body\">Not a career path — a hobby first. I write code to make ideas real and to understand how the world works beneath the surface. The lower the abstraction, the better.<\u002Fdiv>\n        <div class=\"int-tags\">\n          <span class=\"int-tag lime\">Python<\u002Fspan>\n          <span class=\"int-tag lime\">C<\u002Fspan>\n          <span class=\"int-tag lime\">Open Source<\u002Fspan>\n          <span class=\"int-tag lime\">Systems<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"int-card int-brass reveal\">\n        <div class=\"int-ico\">GFX<\u002Fdiv>\n        <div class=\"int-title\">Gaming<\u002Fdiv>\n        <div class=\"int-body\">Sandboxes and roguelikes. I'm drawn to deep systems and emergent outcomes — where no two runs are the same and mastery is earned, never given.<\u002Fdiv>\n        <div class=\"int-tags\">\n          <span class=\"int-tag brass\">Sandbox<\u002Fspan>\n          <span class=\"int-tag brass\">Roguelike<\u002Fspan>\n          <span class=\"int-tag brass\">Procedural<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"int-card int-pur reveal\">\n        <div class=\"int-ico\">HW<\u002Fdiv>\n        <div class=\"int-title\">Hardware Engineering<\u002Fdiv>\n        <div class=\"int-body\">Long-term goal alongside full stack: engineering mobile and portable devices. Computers in your pocket are one of the most impressive things humans have built.<\u002Fdiv>\n        <div class=\"int-tags\">\n          <span class=\"int-tag pur\">Embedded<\u002Fspan>\n          <span class=\"int-tag pur\">Mobile<\u002Fspan>\n          <span class=\"int-tag pur\">IoT<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACT -->\n<section id=\"contact\" data-screen-label=\"Contact\">\n  <div class=\"sec-pad\">\n    <div class=\"contact-inner\">\n      <div class=\"sec-label reveal\">// reach out<\u002Fdiv>\n      <h2 class=\"sec-title reveal\">Contact<\u002Fh2>\n      <p class=\"contact-desc reveal\">Open to collaborations, projects, and conversations about code. Pick your channel.<\u002Fp>\n\n      <div class=\"contact-grid reveal\">\n        <button class=\"contact-btn\" id=\"email-btn\" onclick=\"copyEmail()\" style=\"background:none;cursor:none!important\">\n          <div class=\"cb-ico\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"cb-txt\">\n            <div class=\"cb-lbl\">EMAIL<\u002Fdiv>\n            <div class=\"cb-val\" id=\"email-text\">franixxx6@gmail.com<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cb-arr\">→<\u002Fdiv>\n        <\u002Fbutton>\n\n        <a href=\"https://github.com/Franixx88\" target=\"_blank\" rel=\"noopener\" class=\"contact-btn\">\n          <div class=\"cb-ico\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"cb-txt\">\n            <div class=\"cb-lbl\">GITHUB<\u002Fdiv>\n            <div class=\"cb-val\">Franixx88<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cb-arr\">→<\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"https://t.me/neistoviy_gay\" target=\"_blank\" rel=\"noopener\" class=\"contact-btn\">\n          <div class=\"cb-ico\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8-1.7 8.01c-.12.56-.46.7-.93.43l-2.57-1.9-1.24 1.19c-.14.14-.25.25-.51.25l.18-2.62 4.72-4.27c.21-.18-.04-.28-.32-.1L7.49 15.3l-2.54-.8c-.55-.17-.56-.55.12-.82l9.93-3.83c.46-.17.86.11.64.95z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"cb-txt\">\n            <div class=\"cb-lbl\">TELEGRAM<\u002Fdiv>\n            <div class=\"cb-val\">@neistoviy_gay<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cb-arr\">→<\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  Built by <em>Franix<\u002Fem> — Roman Sidorenko © 2026\n<\u002Ffooter>\n\n<!-- TWEAKS PANEL -->\n<div id=\"tweaks-panel\">\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"tweak-row\">\n    <label>ACCENT COLOR<\u002Flabel>\n    <div class=\"tweak-swatch\">\n      <div class=\"sw active\" style=\"background:#a3e635\" data-accent=\"#a3e635\" title=\"Lime\" onclick=\"setAccent(this)\"><\u002Fdiv>\n      <div class=\"sw\" style=\"background:#d4a017\" data-accent=\"#d4a017\" title=\"Brass\" onclick=\"setAccent(this)\"><\u002Fdiv>\n      <div class=\"sw\" style=\"background:#9b72cf\" data-accent=\"#9b72cf\" title=\"Purple\" onclick=\"setAccent(this)\"><\u002Fdiv>\n      <div class=\"sw\" style=\"background:#22d3ee\" data-accent=\"#22d3ee\" title=\"Cyan\" onclick=\"setAccent(this)\"><\u002Fdiv>\n      <div class=\"sw\" style=\"background:#f97316\" data-accent=\"#f97316\" title=\"Ember\" onclick=\"setAccent(this)\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label>DISPLAY FONT<\u002Flabel>\n    <select onchange=\"setFont(this.value)\">\n      <option value=\"Syne\">Syne<\u002Foption>\n      <option value=\"Unbounded\">Unbounded<\u002Foption>\n      <option value=\"Space Grotesk\">Space Grotesk<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label>PARTICLES<\u002Flabel>\n    <select onchange=\"setParticles(this.value==='true')\">\n      <option value=\"true\">On<\u002Foption>\n      <option value=\"false\">Off<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label>GRID OPACITY<\u002Flabel>\n    <input type=\"range\" min=\"0\" max=\"0.08\" step=\"0.005\" value=\"0.03\" oninput=\"setGrid(this.value)\">\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ── TWEAKS ──\nconst DEFAULTS = /*EDITMODE-BEGIN*/{\"accent\":\"#a3e635\",\"brass\":\"#d4a017\",\"fontDisplay\":\"Syne\",\"showParticles\":true,\"gridOpacity\":0.03}/*EDITMODE-END*/;\n\nlet T = {...DEFAULTS};\nlet showPart = true;\ntry { const s = document.getElementById('__tweaks'); if(s){ const m=s.textContent.match(/\\/\\*EDITMODE-BEGIN\\*\\/([\\s\\S]*?)\\/\\*EDITMODE-END\\*\\//); if(m) T={...T,...JSON.parse(m[1])}; } } catch(e){}\n\nfunction applyTweaks(){\n  document.documentElement.style.setProperty('--lime', T.accent);\n  document.documentElement.style.setProperty('--lime2', T.accent);\n  document.documentElement.style.setProperty('--disp', `'${T.fontDisplay}', sans-serif`);\n  document.querySelectorAll('#hero::before').forEach(()=>{});\n  // Update grid\n  const heroEl = document.getElementById('hero');\n  heroEl.style.setProperty('--grid-op', T.gridOpacity);\n  // particles\n  showPart = T.showParticles;\n  document.getElementById('bg-canvas').style.opacity = T.showParticles ? '1' : '0';\n}\napplyTweaks();\n\nfunction setAccent(el){\n  T.accent=el.dataset.accent;\n  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('active'));\n  el.classList.add('active');\n  applyTweaks();\n  push();\n}\nfunction setFont(v){ T.fontDisplay=v; applyTweaks(); push(); }\nfunction setParticles(v){ T.showParticles=v; applyTweaks(); push(); }\nfunction setGrid(v){ T.gridOpacity=parseFloat(v); applyTweaks(); push(); }\nfunction push(){\n  window.parent.postMessage({type:'__edit_mode_set_keys',edits:{...T}},'*');\n}\n\nwindow.addEventListener('message',e=>{\n  if(e.data?.type==='__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');\n  if(e.data?.type==='__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');\n});\nwindow.parent.postMessage({type:'__edit_mode_available'},'*');\n\n// ── CURSOR ──\nconst dot=document.getElementById('c-dot'), ring=document.getElementById('c-ring'), glowEl=document.getElementById('glow');\ndocument.addEventListener('mousemove',e=>{\n  const x=e.clientX, y=e.clientY;\n  dot.style.left=x+'px'; dot.style.top=y+'px';\n  ring.style.left=x+'px'; ring.style.top=y+'px';\n  glowEl.style.left=x+'px'; glowEl.style.top=y+'px';\n});\ndocument.querySelectorAll('a,button,.gauge-card,.int-card,.contact-btn').forEach(el=>{\n  el.addEventListener('mouseenter',()=>document.body.classList.add('hov'));\n  el.addEventListener('mouseleave',()=>document.body.classList.remove('hov'));\n});\n\n// ── CANVAS (sun burst + particles) ──\nconst canvas=document.getElementById('bg-canvas');\nconst ctx=canvas.getContext('2d');\nlet W,H,pts; let raf;\nshowPart = T.showParticles;\n\nconst rnd=(a,b)=>a+Math.random()*(b-a);\n\nfunction resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }\n\nfunction initPts(){\n  pts=Array.from({length:55},()=>({\n    x:rnd(0,W), y:rnd(0,H),\n    vx:rnd(-.18,.18), vy:rnd(-.35,-.06),\n    r:rnd(.8,2.2), alpha:rnd(.2,.65),\n    col:Math.random()<.6?'lime':'brass'\n  }));\n}\n\nlet t=0;\nfunction draw(){\n  t++;\n  ctx.clearRect(0,0,W,H);\n\n  // Sun burst (solarpunk × steampunk)\n  const sx=W*.7, sy=H*.42, rays=32, maxR=Math.min(W,H)*.52;\n  ctx.save();\n  ctx.translate(sx,sy);\n  ctx.rotate(t*.00025);\n  for(let i=0;i<rays;i++){\n    const ang=(i/rays)*Math.PI*2;\n    const main=i%2===0;\n    const len=main?maxR:maxR*.65;\n    const inner=main?90:75;\n    ctx.beginPath();\n    ctx.moveTo(Math.cos(ang)*inner, Math.sin(ang)*inner);\n    ctx.lineTo(Math.cos(ang)*len,   Math.sin(ang)*len);\n    ctx.strokeStyle=main?`rgba(163,230,53,0.045)`:`rgba(212,160,23,0.025)`;\n    ctx.lineWidth=main?1.2:.7;\n    ctx.stroke();\n  }\n  // concentric rings\n  [88,160,240].forEach((r,i)=>{\n    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);\n    ctx.strokeStyle=i===0?'rgba(212,160,23,0.12)':i===1?'rgba(163,230,53,0.06)':'rgba(212,160,23,0.04)';\n    ctx.lineWidth=.8; ctx.stroke();\n  });\n  ctx.restore();\n\n  // Particles\n  if(showPart && pts){\n    for(let i=0;i<pts.length;i++){\n      const p=pts[i];\n      for(let j=i+1;j<pts.length;j++){\n        const q=pts[j];\n        const d=Math.hypot(p.x-q.x,p.y-q.y);\n        if(d<120){\n          const frac=1-d/120;\n          ctx.beginPath();\n          ctx.strokeStyle=`rgba(163,230,53,${.06*frac})`;\n          ctx.lineWidth=.5;\n          ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();\n        }\n      }\n      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);\n      ctx.fillStyle=p.col==='lime'\n        ? `rgba(163,230,53,${p.alpha*.7})`\n        : `rgba(212,160,23,${p.alpha*.6})`;\n      ctx.fill();\n      p.x+=p.vx; p.y+=p.vy;\n      if(p.y<-10){ p.y=H+10; p.x=rnd(0,W); }\n      if(p.x<0) p.x=W; if(p.x>W) p.x=0;\n    }\n  }\n  requestAnimationFrame(draw);\n}\n\nwindow.addEventListener('resize',()=>{ resize(); initPts(); });\nresize(); initPts(); draw();\n\n// ── TYPEWRITER ──\nconst phrases=['Python Developer','C Programmer','Future Full Stack Eng.','Roguelike Enjoyer','Hardware Enthusiast','Open Source Contributor'];\nlet pi=0,ci=0,del=false;\nconst twEl=document.getElementById('tw-text');\nfunction typeStep(){\n  const ph=phrases[pi];\n  if(!del){\n    twEl.textContent=ph.slice(0,++ci);\n    if(ci===ph.length){ del=true; setTimeout(typeStep,1600); return; }\n    setTimeout(typeStep,65);\n  } else {\n    twEl.textContent=ph.slice(0,--ci);\n    if(ci===0){ del=false; pi=(pi+1)%phrases.length; setTimeout(typeStep,320); return; }\n    setTimeout(typeStep,35);\n  }\n}\ntypeStep();\n\n// ── GAUGE ANIMATION ──\nconst gaugeObs=new IntersectionObserver(entries=>{\n  entries.forEach(e=>{\n    if(!e.isIntersecting) return;\n    e.target.querySelectorAll('.gauge-arc').forEach(arc=>{\n      const pct=parseFloat(arc.dataset.pct);\n      const circ=163.4;\n      setTimeout(()=>{ arc.style.strokeDashoffset=(circ*(1-pct)).toFixed(1); },100);\n    });\n    gaugeObs.unobserve(e.target);\n  });\n},{threshold:.2});\ndocument.querySelectorAll('.gauge-card').forEach(c=>gaugeObs.observe(c));\n\n// ── REVEAL ──\nconst revObs=new IntersectionObserver(entries=>{\n  entries.forEach(e=>{\n    if(e.isIntersecting){ e.target.classList.add('visible'); revObs.unobserve(e.target); }\n  });\n},{threshold:.1});\ndocument.querySelectorAll('.reveal,.reveal-l').forEach(el=>revObs.observe(el));\n\n// ── COPY EMAIL ──\nfunction copyEmail(){\n  navigator.clipboard.writeText('franixxx6@gmail.com').catch(()=>{});\n  const btn=document.getElementById('email-btn');\n  const txt=document.getElementById('email-text');\n  txt.textContent='Copied!';\n  btn.classList.add('copied');\n  setTimeout(()=>{ txt.textContent='franixxx6@gmail.com'; btn.classList.remove('copied'); },2000);\n}\n\n// ── NAV ACTIVE ──\nconst navAs=document.querySelectorAll('.nav-links a');\nconst navObs=new IntersectionObserver(entries=>{\n  entries.forEach(e=>{\n    if(e.isIntersecting){\n      navAs.forEach(a=>a.style.color='');\n      const a=document.querySelector(`.nav-links a[href=\"#${e.target.id}\"]`);\n      if(a) a.style.color='var(--brass)';\n    }\n  });\n},{rootMargin:'-40% 0px -40% 0px'});\ndocument.querySelectorAll('section[id]').forEach(s=>navObs.observe(s));\n\n// ── STEAMPUNK+SOLARPUNK DECORATIONS ──\nconst GEAR_SVG = `<svg viewBox=\"-50 -50 100 100\" width=\"100%\" height=\"100%\"><g stroke=\"currentColor\" fill=\"none\" stroke-width=\"1.5\"><circle r=\"30\"/><circle r=\"20\"/><\u002Fg><circle r=\"6\" fill=\"currentColor\"/><g fill=\"currentColor\">${[0,30,60,90,120,150,180,210,240,270,300,330].map(a=>`<rect x=\"-3\" y=\"-40\" width=\"6\" height=\"9\" transform=\"rotate(${a})\"/>`).join('')}<\u002Fg><g stroke=\"currentColor\" stroke-width=\"1\" fill=\"none\" opacity=\".6\"><line x1=\"-15\" y1=\"0\" x2=\"15\" y2=\"0\"/><line x1=\"0\" y1=\"-15\" x2=\"0\" y2=\"15\"/><\u002Fg><\u002Fsvg>`;\n\nconst SOLAR_SVG = `<svg viewBox=\"0 0 120 80\" width=\"100%\"><g stroke=\"currentColor\" stroke-width=\"0.7\" fill=\"rgba(163,230,53,0.08)\"><rect x=\"4\" y=\"4\" width=\"27\" height=\"22\"/><rect x=\"32\" y=\"4\" width=\"27\" height=\"22\"/><rect x=\"60\" y=\"4\" width=\"27\" height=\"22\"/><rect x=\"88\" y=\"4\" width=\"27\" height=\"22\"/><rect x=\"4\" y=\"27\" width=\"27\" height=\"22\"/><rect x=\"32\" y=\"27\" width=\"27\" height=\"22\"/><rect x=\"60\" y=\"27\" width=\"27\" height=\"22\"/><rect x=\"88\" y=\"27\" width=\"27\" height=\"22\"/><rect x=\"4\" y=\"50\" width=\"27\" height=\"22\"/><rect x=\"32\" y=\"50\" width=\"27\" height=\"22\"/><rect x=\"60\" y=\"50\" width=\"27\" height=\"22\"/><rect x=\"88\" y=\"50\" width=\"27\" height=\"22\"/><\u002Fg><line x1=\"60\" y1=\"73\" x2=\"60\" y2=\"79\" stroke=\"currentColor\" stroke-width=\"1.2\"/><rect x=\"54\" y=\"78\" width=\"12\" height=\"2\" fill=\"currentColor\"/><\u002Fsvg>`;\n\nconst VINE_SVG = `<svg viewBox=\"0 0 60 200\" preserveAspectRatio=\"none\" width=\"100%\" height=\"100%\"><path d=\"M30 200 Q36 170 28 140 Q18 110 32 80 Q40 55 26 28 Q22 14 30 0\" stroke=\"currentColor\" stroke-width=\"2.2\" fill=\"none\" stroke-linecap=\"round\" opacity=\".85\"/><g fill=\"currentColor\" opacity=\".75\"><ellipse cx=\"44\" cy=\"142\" rx=\"9\" ry=\"4.5\" transform=\"rotate(35 44 142)\"/><ellipse cx=\"14\" cy=\"100\" rx=\"9\" ry=\"4.5\" transform=\"rotate(-35 14 100)\"/><ellipse cx=\"42\" cy=\"58\" rx=\"7\" ry=\"3.5\" transform=\"rotate(30 42 58)\"/><ellipse cx=\"18\" cy=\"170\" rx=\"7\" ry=\"3.5\" transform=\"rotate(-25 18 170)\"/><circle cx=\"30\" cy=\"10\" r=\"3\"/><\u002Fg><\u002Fsvg>`;\n\nfunction inject(parent, html, cls, extraCls=''){\n  const d = document.createElement('div');\n  d.className = 'deco-svg ' + cls + (extraCls?' '+extraCls:'');\n  d.innerHTML = html;\n  parent.appendChild(d);\n}\n\n// place decorations\nconst hero=document.getElementById('hero');\nconst sk=document.getElementById('skills');\nconst tl=document.getElementById('timeline');\nconst ints=document.getElementById('interests');\nconst ct=document.getElementById('contact');\n\ninject(hero, GEAR_SVG, 'gear-decor g-hero-br');\ninject(hero, GEAR_SVG, 'gear-decor rev g-hero-tl');\ninject(hero, SOLAR_SVG, 'solar-decor sp-hero');\n\ninject(sk, GEAR_SVG, 'gear-decor rev g-sk-r');\ninject(sk, GEAR_SVG, 'gear-decor fast g-sk-l');\ninject(sk, SOLAR_SVG, 'solar-decor sp-sk');\n\ninject(tl, GEAR_SVG, 'gear-decor g-tl-r');\ninject(tl, GEAR_SVG, 'gear-decor rev g-tl-l');\n\ninject(ints, GEAR_SVG, 'gear-decor rev g-int-r');\ninject(ints, SOLAR_SVG, 'solar-decor sp-int-1');\ninject(ints, SOLAR_SVG, 'solar-decor sp-int-2');\n\ninject(ct, GEAR_SVG, 'gear-decor g-ct-l');\n\n// vines\nconst vl = document.getElementById('vines-layer');\nfor(let i=1;i<=6;i++){\n  const v = document.createElement('div');\n  v.className = 'vine vine-'+i;\n  v.innerHTML = VINE_SVG;\n  vl.appendChild(v);\n}\n\n// ── OXIDATION SCROLL ──\nfunction onOxScroll(){\n  const sh = document.documentElement.scrollHeight - window.innerHeight;\n  const p = Math.min(1, Math.max(0, window.scrollY / Math.max(sh, 1)));\n  // ease: stronger effect in the last 50%\n  const ox = Math.pow(p, 1.2);\n  document.documentElement.style.setProperty('--ox', ox.toFixed(3));\n  // brass → patina interpolation\n  const r = Math.round(212 + (93-212)*ox);\n  const g = Math.round(160 + (158-160)*ox);\n  const b = Math.round(23 + (117-23)*ox);\n  document.documentElement.style.setProperty('--brass', `rgb(${r},${g},${b})`);\n  document.documentElement.style.setProperty('--bord', `rgba(${r},${g},${b},0.2)`);\n}\nwindow.addEventListener('scroll', onOxScroll, {passive:true});\nonOxScroll();\n\n// ── MAXIMALIST STEAMPUNK JS ──\nconst joints = document.querySelectorAll('[data-joint]');\n\nfunction puffAt(x, y, count=1){\n  for(let i=0;i<count;i++){\n    const p = document.createElement('div');\n    p.className = 'steam';\n    p.style.left = x+'px'; p.style.top = y+'px';\n    const drift = (Math.random()-.5)*40;\n    const drift2 = drift + (Math.random()-.5)*30;\n    const drift3 = drift2 + (Math.random()-.5)*40;\n    p.style.setProperty('--sx', `calc(-50% + ${drift}px)`);\n    p.style.setProperty('--sx2', `calc(-50% + ${drift2}px)`);\n    p.style.setProperty('--sx3', `calc(-50% + ${drift3}px)`);\n    document.body.appendChild(p);\n    setTimeout(()=>p.remove(), 2500);\n  }\n}\n\nfunction randomPuff(){\n  if(!joints.length) return;\n  const j = joints[Math.floor(Math.random()*joints.length)];\n  const r = j.getBoundingClientRect();\n  const cx = r.left + r.width/2;\n  const cy = r.top + r.height/2;\n  j.classList.add('hot');\n  puffAt(cx, cy, 2 + Math.floor(Math.random()*2));\n  setTimeout(()=>j.classList.remove('hot'), 600);\n  setTimeout(randomPuff, 800 + Math.random()*2200);\n}\nsetTimeout(randomPuff, 1200);\n\n// Cursor proximity → heat up nearby joints & emit extra steam\nlet lastCursorPuff = 0;\ndocument.addEventListener('mousemove', e => {\n  const now = Date.now();\n  joints.forEach(j => {\n    const r = j.getBoundingClientRect();\n    const cx = r.left + r.width/2;\n    const cy = r.top + r.height/2;\n    const d = Math.hypot(e.clientX-cx, e.clientY-cy);\n    if(d < 120){ j.classList.add('hot'); }\n    else j.classList.remove('hot');\n    if(d < 80 && now - lastCursorPuff > 250){\n      puffAt(cx, cy, 1);\n      lastCursorPuff = now;\n    }\n  });\n});\n\n// Rivets on cards\ndocument.querySelectorAll('.gauge-card, .int-card, .tl-item, .contact-btn').forEach(card=>{\n  ['rv-tl','rv-tr','rv-bl','rv-br'].forEach(pos=>{\n    const r = document.createElement('div');\n    r.className = 'rivet ' + pos;\n    card.appendChild(r);\n  });\n});\n\n// Lightbulbs scattered in sections\nconst BULB_POSITIONS = [\n  ['#hero', [['top','90px','left','30%'],['top','50%','right','38%']]],\n  ['#skills', [['top','60px','left','38%'],['bottom','80px','right','22%']]],\n  ['#timeline', [['top','90px','right','18%']]],\n  ['#interests', [['top','40px','left','25%'],['bottom','100px','right','35%']]],\n  ['#contact', [['top','70px','right','10%']]],\n];\nBULB_POSITIONS.forEach(([sel, arr])=>{\n  const sec = document.querySelector(sel);\n  if(!sec) return;\n  arr.forEach(styles=>{\n    const b = document.createElement('div');\n    b.className = 'bulb';\n    for(let i=0;i<styles.length;i+=2) b.style[styles[i]] = styles[i+1];\n    sec.appendChild(b);\n  });\n});\n\n// Windmills removed\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
